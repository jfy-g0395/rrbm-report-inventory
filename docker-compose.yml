version: "3.9"

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rrbm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       rrbm_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - rrbm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ────────────────────────────────────────────────────
  backend:
    build: ./rrbm-backend
    container_name: rrbm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/rrbm_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RRBM_JWT_SECRET:            ${RRBM_JWT_SECRET}
      RRBM_INITIAL_MASTER_KEY:    ${RRBM_INITIAL_MASTER_KEY}

  # ── Nginx frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./rrbm_frontend
    container_name: rrbm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  rrbm_db_data:
