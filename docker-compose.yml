services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rrbm_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       rrbm_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - rrbm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ────────────────────────────────────────────────────
  backend:
    build: ./rrbm-backend
    container_name: rrbm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/rrbm_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RRBM_JWT_SECRET:            ${RRBM_JWT_SECRET}
      RRBM_INITIAL_MASTER_KEY:    ${RRBM_INITIAL_MASTER_KEY}
      # M-2.4 / M-2.2 production hardening
      RRBM_CORS_ALLOWED_ORIGINS:        ${RRBM_CORS_ALLOWED_ORIGINS}
      RRBM_FAIL_ON_DEFAULT_JWT_SECRET:  "true"
      # Mail: low-stock email alerts are disabled by default (rrbm.mail.enabled=false).
      # Spring Boot only creates the JavaMailSender bean when a host is set, and
      # LowStockEmailService requires that bean to exist even while disabled, so we
      # supply a placeholder host. No SMTP connection is made unless mail is enabled.
      # To enable real alerts later: set a real SPRING_MAIL_HOST + RRBM_MAIL_ENABLED=true.
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-localhost}
    # M-4.3: readiness gate — busybox wget ships in the temurin-alpine runtime image
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Nginx frontend ─────────────────────────────────────────────────────────
  frontend:
    build: ./rrbm_frontend
    container_name: rrbm_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  rrbm_db_data:
