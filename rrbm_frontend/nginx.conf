server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;

        # Never let the browser serve a stale app shell: index.html must always be
        # revalidated so a new deploy's app.js?v= token reaches users immediately
        # (app.js itself stays cache-busted by its ?v= query token). Without this,
        # nginx's default heuristic caching can pin users to an old index.html — and
        # thus old JS — until they hard-refresh.
        add_header Cache-Control "no-cache" always;

        # add_header in a location suppresses server-level add_headers, so re-declare
        # the security headers here to keep them on these responses.
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header Referrer-Policy        "strict-origin" always;
    }

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Headroom for bulk endpoints (CSV import, batch commit). The default 60s read
        # timeout cut large imports mid-commit — nginx returned 504 while the backend kept
        # writing, so the modal hung and the orders only appeared after a manual refresh.
        # The O(N^2) import slowness is fixed at the source (per-row persistence-context
        # clear); this is defensive headroom so a genuinely large-but-legitimate import
        # still returns its success report instead of timing out.
        proxy_connect_timeout  75s;
        proxy_send_timeout     180s;
        proxy_read_timeout     180s;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin" always;
}
