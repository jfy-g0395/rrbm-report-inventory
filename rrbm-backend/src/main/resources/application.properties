# ========================================================================
# RRBM Backend Configuration
# ========================================================================

# Load secrets from application-local.properties (not committed to Git)
spring.config.import=optional:classpath:application-local.properties

# Application name
spring.application.name=rrbm-backend

# Server port
server.port=8080

# ========================================================================
# Database Configuration (PostgreSQL)
# ========================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/rrbm_db
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================================================================
# Flyway Configuration (Database Migrations)
# ========================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ========================================================================
# Security (temporarily disabled for initial testing)
# ========================================================================
spring.security.user.name=admin

# ========================================================================
# Logging
# ========================================================================
logging.level.com.rrbm=INFO
logging.level.org.springframework.security=WARN

# Temporarily disable default Spring Security for testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration