# ========================================================================
# RRBM Backend Configuration
# ========================================================================

# Load secrets from application-local.properties (not committed to Git)
spring.config.import=optional:classpath:application-local.properties

# Application name
spring.application.name=rrbm-backend

# Server port
server.port=8080

# ========================================================================
# Database Configuration (PostgreSQL)
# ========================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/rrbm_db
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================================================
# Flyway Configuration (Database Migrations)
# ========================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true

# ========================================================================
# JWT
# ========================================================================
# Secret is read from the RRBM_JWT_SECRET environment variable at runtime.
# The value after the colon is the fallback used in local dev only.
rrbm.jwt.secret=${RRBM_JWT_SECRET:rrbm-secret-key-minimum-256-bits-for-hs256-algorithm-security}

# ========================================================================
# Seeding
# ========================================================================
# Initial master key seeded on first boot (only if DB has no master keys).
# Production: set RRBM_INITIAL_MASTER_KEY env var in .env
# Local dev: falls back to rrbm2024 (seed skipped if DB already has keys)
rrbm.initial.master.key=${RRBM_INITIAL_MASTER_KEY:rrbm2024}

# ========================================================================
# Security
# ========================================================================
# Suppress Spring Boot's auto-generated "Using generated security password" warning.
# Our own JWT filter handles all authentication.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ========================================================================
# Logging
# ========================================================================
logging.level.rrbm_backend=INFO
logging.level.org.springframework.security=WARN