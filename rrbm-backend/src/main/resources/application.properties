# ========================================================================
# RRBM Backend Configuration
# ========================================================================

# Load secrets from application-local.properties (not committed to Git)
spring.config.import=optional:classpath:application-local.properties

# Application name
spring.application.name=rrbm-backend

# Server port
server.port=8080

# ========================================================================
# Database Configuration (PostgreSQL)
# ========================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/rrbm_db
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================================================
# Flyway Configuration (Database Migrations)
# ========================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true

# ========================================================================
# JWT
# ========================================================================
# Secret is read from the RRBM_JWT_SECRET environment variable at runtime.
# The value after the colon is the fallback used in local dev only.
rrbm.jwt.secret=${RRBM_JWT_SECRET:rrbm-secret-key-minimum-256-bits-for-hs256-algorithm-security}
# M-2.2: in production set this to true so the app refuses to boot on the dev fallback secret.
rrbm.security.fail-on-default-jwt-secret=${RRBM_FAIL_ON_DEFAULT_JWT_SECRET:false}

# ========================================================================
# CORS
# ========================================================================
# M-2.4: comma-separated list of allowed browser origins (no wildcard with credentials).
# Set RRBM_CORS_ALLOWED_ORIGINS to your exact production domain(s), e.g.
#   RRBM_CORS_ALLOWED_ORIGINS=https://app.example.com,https://example.com
rrbm.cors.allowed-origins=${RRBM_CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://127.0.0.1,http://localhost:5500}

# ========================================================================
# Seeding
# ========================================================================
# Initial master key seeded on first boot (only if DB has no master keys).
# Production: set RRBM_INITIAL_MASTER_KEY env var in .env
# Local dev: falls back to rrbm2024 (seed skipped if DB already has keys)
rrbm.initial.master.key=${RRBM_INITIAL_MASTER_KEY:rrbm2024}

# ========================================================================
# Security
# ========================================================================
# Suppress Spring Boot's auto-generated "Using generated security password" warning.
# Our own JWT filter handles all authentication.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ========================================================================
# Actuator / Health (M-4.3)
# ========================================================================
# Expose only the health endpoint; never enumerate beans/env/etc. publicly.
management.endpoints.web.exposure.include=health
# Hide internal component breakdown from unauthenticated callers.
management.endpoint.health.show-details=never
# Mail (SMTP) is a non-critical dependency — its reachability must not gate app
# readiness, or a flaky/misconfigured mail server would mark the container unhealthy
# and block the frontend from starting. The DB contributor still gates readiness.
management.health.mail.enabled=false

# ========================================================================
# DevTools
# ========================================================================
# Disable Tomcat session persistence — prevents the DevTools temp-dir
# ownership check from blocking startup on Windows dev machines.
server.servlet.session.persistent=false

# ========================================================================
# Logging
# ========================================================================
logging.level.rrbm_backend=INFO
logging.level.org.springframework.security=WARN